name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-backend:
    name: Backend Tests & Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: billsuser
          POSTGRES_PASSWORD: billspass
          POSTGRES_DB: bills_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://billsuser:billspass@localhost:5432/bills_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: apps/server/requirements.txt

      - name: Install Python dependencies
        run: |
          cd apps/server
          pip install -r requirements.txt

      - name: Run pytest (self-hosted)
        env:
          DEPLOYMENT_MODE: self-hosted
        run: |
          cd apps/server
          pytest -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Run pytest (SaaS)
        env:
          DEPLOYMENT_MODE: saas
        run: |
          cd apps/server
          pytest -v --cov=. --cov-append --cov-report=xml --cov-report=term-missing

      - name: Run bandit security scan
        run: |
          cd apps/server
          bandit -r . -x tests -c bandit.yaml -f txt

      - name: Run pip-audit
        run: |
          pip-audit -r apps/server/requirements.txt

  test-frontend:
    name: Frontend Tests & Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.18.0'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd apps/web
          npm ci

      - name: Run vitest
        run: |
          cd apps/web
          npm run test

      - name: Run ESLint
        run: |
          cd apps/web
          npm run lint

      - name: Build frontend (TypeScript check)
        run: |
          cd apps/web
          npm run build

      - name: Run npm audit
        run: |
          cd apps/web
          npm audit --audit-level=high

  test-mobile:
    name: Mobile Contract, Tests & SDK Compatibility
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.18.0'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install mobile dependencies
        run: |
          cd apps/mobile
          npm ci

      - name: Verify shared translations are synchronized
        run: |
          cd apps/mobile
          npm run i18n:sync
          git diff --exit-code -- src/i18n/locales

      - name: Verify generated API contract is synchronized
        run: |
          cd apps/mobile
          npm run api:check

      - name: Run mobile lint, typecheck, and tests
        run: |
          cd apps/mobile
          npm run lint
          npm run typecheck
          npm test

      - name: Validate Maestro device-flow definitions
        run: |
          cd apps/mobile
          npm run maestro:validate

      - name: Validate native build transport profiles
        run: |
          cd apps/mobile
          npm run config:validate

      - name: Verify Expo SDK compatibility
        run: |
          cd apps/mobile
          npx expo install --check
          npm run doctor

      - name: Run mobile npm audit
        run: |
          cd apps/mobile
          npm audit --audit-level=high

  security-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Docker Image
    needs: [test-backend, test-frontend, test-mobile, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Set latest tag for main branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            # Set version tags from git tags (v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Set branch name for non-main branches
            type=ref,event=branch,enable=${{ github.ref != format('refs/heads/{0}', 'main') }}
            # Set short SHA
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
