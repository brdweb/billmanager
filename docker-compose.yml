# BillManager - Docker Compose
# Update the environment variables before running: docker compose up -d

services:
  billmanager:
    build: .
    # image: ghcr.io/brdweb/billmanager:latest
    ports:
      - "5000:5000"
    environment:
      # Required - generate with: openssl rand -hex 32
      - FLASK_SECRET_KEY=change-me-generate-with-openssl
      - JWT_SECRET_KEY=change-me-generate-with-openssl
      - DATABASE_URL=postgresql://billsuser:change-me@db:5432/billmanager

      # Deployment mode (self-hosted or saas)
      - DEPLOYMENT_MODE=self-hosted

      # Deployment-wide bill currency, set here with no UI selector.
      # Supported, in order: USD, EUR, JPY, GBP, CNY, CHF, AUD, CAD, HKD, SGD,
      # INR, KRW, SEK, NZD, MXN. JPY/KRW use zero minor units; the rest use two.
      # Invalid values fail startup. Language changes do not change this currency.
      # Changing it does not convert stored amounts. Review fractional data before
      # switching to JPY/KRW. SaaS subscription pricing remains USD.
      # DEFAULT_LOCALE controls regional formatting and defaults to en-US.
      - DEFAULT_CURRENCY=${DEFAULT_CURRENCY:-USD}
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-en-US}

      # Registration settings (optional)
      # - ENABLE_REGISTRATION=true  # Allow public registration
      # - REQUIRE_EMAIL_VERIFICATION=true  # Require email verification

      # Email settings (optional - for password reset, verification, invitations, and email OTP)
      # SMTP is recommended for self-hosted installs. Use your mail provider
      # or an existing relay; BillManager does not include a production SMTP server.
      # - EMAIL_PROVIDER=smtp
      # - SMTP_HOST=smtp.example.com
      # - SMTP_PORT=587
      # - SMTP_USERNAME=your-smtp-username
      # - SMTP_PASSWORD=your-smtp-password
      # - SMTP_USE_TLS=true
      # - SMTP_USE_SSL=false
      # - SMTP_TIMEOUT=10
      # - FROM_EMAIL=noreply@yourdomain.com
      # - APP_URL=https://bills.yourdomain.com
      # Resend remains supported as an alternative:
      # - EMAIL_PROVIDER=resend
      # - RESEND_API_KEY=re_your_api_key
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=billsuser
      - POSTGRES_PASSWORD=change-me  # Match DATABASE_URL password
      - POSTGRES_DB=billmanager
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
