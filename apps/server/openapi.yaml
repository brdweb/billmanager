openapi: 3.0.3
info:
  title: BillManager API
  description: |
    REST API for BillManager - a multi-tenant bill tracking application.

    ## Authentication

    API v2 uses JWT (JSON Web Token) authentication:
    1. Call `/api/v2/auth/login` with username/password to get tokens
    2. Include `Authorization: Bearer <access_token>` header in requests
    3. Include `X-Database: <database_name>` header to select workspace
    4. Use `/api/v2/auth/refresh` to get new access tokens when expired

    Access tokens expire after 15 minutes. Refresh tokens expire after 7 days.

  version: 4.4.1
  license:
    name: O'Saasy License
    url: https://osaasy.dev/
  contact:
    name: BillManager
    url: https://github.com/brdweb/billmanager

servers:
  - url: /api/v2
    description: API v2 (JWT Authentication)

tags:
  - name: Authentication
    description: Login, logout, and token management
  - name: Account
    description: Current-account profile and lifecycle
  - name: Billing
    description: SaaS subscription configuration and customer actions
  - name: Bills
    description: Bill management operations
  - name: Bill Shares
    description: Share bills with other users and manage shared bill payments
  - name: Settlements
    description: Shared-bill balances and settlement state
  - name: Payments
    description: Payment recording and history
  - name: Budgets
    description: Category budget targets and summaries
  - name: Invitations
    description: User invitation management and public invitation acceptance
  - name: Statistics
    description: Analytics and reporting
  - name: Administration
    description: Admin-only users, invitations, and bill-group management
  - name: Notifications
    description: Notification configuration and administrative delivery tools
  - name: Devices
    description: Legacy remote-notification device registrations
  - name: Sync
    description: Offline cache bootstrap, deltas, and mutation push
  - name: Telemetry
    description: Account-owner telemetry consent
  - name: Utilities
    description: Helper endpoints

paths:
  /auth/login:
    post:
      tags: [Authentication]
      summary: Login and get JWT tokens
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: password123
                device_info:
                  type: string
                  description: Optional device identifier for token management
                  example: "iPhone 15 Pro"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Password change required
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Password change required"
                  require_password_change:
                    type: boolean
                    example: true
                  change_token:
                    type: string

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      operationId: refreshAccessToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      expires_in:
                        type: integer
                        example: 900
                      token_type:
                        type: string
                        example: Bearer
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout and revoke refresh token
      operationId: logout
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/logout-all:
    post:
      tags: [Authentication]
      summary: Logout from all devices
      operationId: logoutAllDevices
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401': {$ref: '#/components/responses/Unauthorized'}

  /auth/change-password:
    post:
      tags: [Authentication]
      summary: Change a password
      operationId: changeForcedPassword
      description: |
        Supports either an unauthenticated forced-change flow using
        `change_token`, or an authenticated self-service flow using
        `current_password` and a bearer token.
      security:
        - {}
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_password]
              oneOf:
                - required: [change_token]
                - required: [current_password]
              properties:
                change_token:
                  type: string
                current_password:
                  type: string
                  format: password
                new_password:
                  type: string
                  format: password
                  minLength: 8
                device_info:
                  type: string
      responses:
        '200':
          description: Password changed; a change-token flow also returns new tokens
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginResponse'
                  - $ref: '#/components/schemas/SuccessResponse'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}

  /auth/reauthenticate:
    post:
      tags: [Authentication]
      summary: Verify the signed-in user's password without rotating credentials
      operationId: reauthenticateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Password verified
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    required: [reauthenticated]
                    properties:
                      reauthenticated:
                        type: boolean
                        const: true
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}

  /me:
    get:
      tags: [Authentication]
      summary: Get current user info
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User information
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      username:
                        type: string
                      role:
                        type: string
                        enum: [admin, user]
                      databases:
                        type: array
                        items:
                          $ref: '#/components/schemas/DatabaseInfo'
                      current_db:
                        type: string
                        nullable: true
        '401': {$ref: '#/components/responses/Unauthorized'}

  /bills:
    get:
      tags: [Bills]
      summary: List all bills
      operationId: listBills
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDatabase'
        - name: include_archived
          in: query
          schema:
            type: boolean
            default: false
        - name: type
          in: query
          description: Optionally filter bills by transaction type.
          schema:
            type: string
            enum: [expense, deposit]
      responses:
        '200':
          description: List of bills
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Bill'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
    post:
      tags: [Bills]
      summary: Create a new bill
      operationId: createBill
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDatabase'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillCreateInput'
      responses:
        '201':
          description: Bill created
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      message:
                        type: string
                      last_updated:
                        type: string
                        format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /bills/{bill_id}:
    get:
      tags: [Bills]
      summary: Get a single bill
      operationId: getBill
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDatabase'
        - $ref: '#/components/parameters/BillId'
      responses:
        '200':
          description: Bill details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Bill'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
    put:
      tags: [Bills]
      summary: Update a bill
      operationId: updateBill
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDatabase'
        - $ref: '#/components/parameters/BillId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillUpdateInput'
      responses:
        '200':
          description: Bill updated
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Bills]
      summary: Archive a bill
      operationId: archiveBill
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDatabase'
        - $ref: '#/components/parameters/BillId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutationControl'
      responses:
        '200':
          description: Bill archived
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /bills/{bill_id}/unarchive:
    post:
      tags: [Bills]
      summary: Unarchive a bill
      operationId: unarchiveBill
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDatabase'
        - $ref: '#/components/parameters/BillId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutationControl'
      responses:
        '200':
          description: Bill unarchived
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /bills/{bill_id}/permanent:
    delete:
      tags: [Bills]
      summary: Permanently delete a bill
      operationId: deleteBillPermanently
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDatabase'
        - $ref: '#/components/parameters/BillId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MutationControl'
      responses:
        '200':
          description: Bill permanently deleted
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /bills/{bill_id}/shares:
    get:
      tags: [Bill Shares]
      summary: Get list of shares for a bill (owner only)
      operationId: listBillShares
      x-capability: sharing
      description: Returns all shares for a bill. Only the bill owner can view shares.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDatabase'
        - $ref: '#/components/parameters/BillId'
      responses:
        '200':
          description: List of bill shares
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BillShare'
        '403':
          description: Only bill owner can view shares
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}

  /bills/{bill_id}/share:
    post:
      tags: [Bill Shares]
      summary: Create a new bill share
      operationId: createBillShare
      x-capability: sharing
      description: Share a bill with another user by username or email.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDatabase'
        - $ref: '#/components/parameters/BillId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillShareCreateInput'
      responses:
        '201':
          description: Share created successfully
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillShareResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /shared-bills/pending:
    get:
      tags: [Bill Shares]
      summary: Get pending shares for current user
      operationId: listPendingShares
      x-capability: sharing
      description: Returns all bill shares pending acceptance by the current user across all databases
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of pending shares
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BillShareWithBillInfo'
        '401': {$ref: '#/components/responses/Unauthorized'}

  /shares/{share_id}/accept:
    post:
      tags: [Bill Shares]
      summary: Accept a pending share
      operationId: acceptShare
      x-capability: sharing
      description: Accept a bill share invitation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ShareId'
      requestBody:
        required: false
        content:
          application/json:
            schema: {$ref: '#/components/schemas/MutationControl'}
      responses:
        '200':
          description: Share accepted
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

  /shares/{share_id}/decline:
    post:
      tags: [Bill Shares]
      summary: Decline a pending share
      operationId: declineShare
      x-capability: sharing
      description: Decline a bill share invitation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ShareId'
      requestBody:
        required: false
        content:
          application/json:
            schema: {$ref: '#/components/schemas/MutationControl'}
      responses:
        '200':
          description: Share declined
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActionResponse'
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

  /shares/{share_id}/mark-paid:
    post:
      tags: [Bill Shares]
      summary: Mark recipient portion as paid
      operationId: toggleSharePaid
      x-capability: settlements
      description: Allows share recipient to mark their portion of the bill as paid
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ShareId'
      requestBody:
        required: false
        content:
          application/json:
            schema: {$ref: '#/components/schemas/MutationControl'}
      responses:
        '200':
          description: Recipient payment state toggled
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ActionResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

  /shares/{share_id}:
    put:
      tags: [Bill Shares]
      summary: Update share split configuration (owner only)
      operationId: updateShare
      x-capability: sharing
      description: Update the split type and value for an existing share. Only the bill owner can update shares.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ShareId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillShareUpdateInput'
      responses:
        '200':
          description: Share updated successfully
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ActionResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}
    delete:
      tags: [Bill Shares]
      summary: Revoke/delete a share (owner only)
      operationId: revokeShare
      x-capability: sharing
      description: Revoke or permanently delete a bill share. Only the bill owner can delete shares.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ShareId'
      requestBody:
        required: false
        content:
          application/json:
            schema: {$ref: '#/components/schemas/MutationControl'}
      responses:
        '200':
          description: Share revoked/deleted successfully
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ActionResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

  /shares/{share_id}/leave:
    post:
      tags: [Bill Shares]
      summary: Leave a shared bill (recipient only)
      operationId: leaveShare
      x-capability: sharing
      description: Allows a share recipient to leave a shared bill
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ShareId'
      requestBody:
        required: false
        content:
          application/json:
            schema: {$ref: '#/components/schemas/MutationControl'}
      responses:
        '200':
          description: Successfully left the share
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ActionResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

  /share-info:
    get:
      tags: [Bill Shares]
      summary: Get share invitation details by token (public)
      operationId: getShareInviteInfo
      x-capability: sharing
      description: Retrieve information about a share invitation using the invite token. No authentication required.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: The invitation token
      responses:
        '200':
          description: Share invitation details
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    required:
                      - bill_name
                      - bill_amount
                      - owner
                      - owner_username
                      - shared_with_email
                      - split_type
                      - split_value
                      - my_portion
                      - expires_at
                      - updated_at
                    properties:
                      bill_name:
                        type: string
                      bill_amount:
                        type: number
                        nullable: true
                      owner:
                        type: string
                        deprecated: true
                        description: Backward-compatible alias for owner_username
                      owner_username:
                        type: string
                        description: Username of the bill owner
                      shared_with_email:
                        type: string
                        format: email
                        description: Email address that received the invitation
                      split_type:
                        type: string
                        enum: [percentage, fixed, equal]
                        nullable: true
                      split_value:
                        type: number
                        nullable: true
                      my_portion:
                        type: number
                        nullable: true
                        description: Calculated portion amount
                      expires_at:
                        type: string
                        format: date-time
                        nullable: true
                      updated_at:
                        type: string
                        format: date-time
        '400': {$ref: '#/components/responses/BadRequest'}
        '404':
          description: Invalid or expired invitation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /share/accept-by-token:
    post:
      tags: [Bill Shares]
      summary: Accept share invitation by token
      operationId: acceptShareByToken
      x-capability: sharing
