          content:
            application/json:
              schema: {$ref: '#/components/schemas/ObjectDataResponse'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '503': {$ref: '#/components/responses/ServerError'}

  /notifications/reminders:
    post:
      tags: [Notifications]
      summary: Trigger legacy server-side reminder delivery
      operationId: triggerNotificationReminders
      x-legacy-capability: remote_notifications
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                days_ahead:
                  type: array
                  items: {type: integer, minimum: 0}
      responses:
        '200':
          description: Reminder processing statistics
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ObjectDataResponse'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '503': {$ref: '#/components/responses/ServerError'}

  /shares/cleanup-expired:
    post:
      tags: [Bill Shares]
      summary: Delete expired pending bill-share invitations
      operationId: cleanupExpiredShares
      x-capability: administration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cleanup statistics
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ObjectDataResponse'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '429': {$ref: '#/components/responses/RateLimited'}
        '500': {$ref: '#/components/responses/ServerError'}

  /openapi.yaml:
    get:
      tags: [Utilities]
      summary: Download this OpenAPI document
      operationId: getOpenApiDocument
      security: []
      responses:
        '200':
          description: OpenAPI YAML document
          content:
            text/yaml:
              schema: {type: string}
        '404': {$ref: '#/components/responses/NotFound'}

  /docs:
    get:
      tags: [Utilities]
      summary: Open interactive API documentation
      operationId: getApiDocumentation
      security: []
      responses:
        '200':
          description: Swagger UI document
          content:
            text/html:
              schema: {type: string}

  /devices:
    get:
      tags: [Devices]
      summary: List legacy remote-push device registrations
      operationId: listDevices
      x-legacy-capability: remote_notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Registered devices
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ListDataResponse'}
        '401': {$ref: '#/components/responses/Unauthorized'}
    post:
      tags: [Devices]
      summary: Register or update a legacy remote-push device
      operationId: registerDevice
      x-legacy-capability: remote_notifications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/DeviceRegistrationInput'}
      responses:
        '200':
          description: Existing device updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ActionResponse'}
        '201':
          description: Device registered
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ActionResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}

  /devices/{device_id}:
    delete:
      tags: [Devices]
      summary: Unregister a legacy remote-push device
      operationId: unregisterDevice
      x-legacy-capability: remote_notifications
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Device unregistered
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ActionResponse'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}

  /devices/{device_id}/push-token:
    put:
      tags: [Devices]
      summary: Replace a legacy remote-push token
      operationId: updateDevicePushToken
      x-legacy-capability: remote_notifications
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/PushTokenInput'}
      responses:
        '200':
          description: Push token updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ActionResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}

  /sync/push:
    post:
      tags: [Sync]
      summary: Push an ordered batch of offline bill and payment changes
      operationId: pushSyncChanges
      x-capability: idempotent_mutations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDatabase'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/SyncPushInput'}
      responses:
        '200':
          description: Accepted and rejected batch entries
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SyncPushResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}
        '409': {$ref: '#/components/responses/Conflict'}

  /sync:
    get:
      tags: [Sync]
      summary: Get bill and payment changes since a sync cursor
      operationId: getSyncChanges
      x-capability: delta_sync
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDatabase'
        - name: since
          in: query
          required: true
          schema: {type: string, format: date-time}
        - name: include_archived
          in: query
          schema: {type: boolean, default: false}
      responses:
        '200':
          description: Changed bills and payments plus next server cursor
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SyncPullResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}

  /sync/full:
    get:
      tags: [Sync]
      summary: Get a complete bill and payment snapshot
      operationId: getFullSyncSnapshot
      x-capability: delta_sync
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XDatabase'
        - name: include_archived
          in: query
          schema: {type: boolean, default: false}
      responses:
        '200':
          description: Complete bills and payments for the selected bill group
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SyncPullResponse'}
        '400': {$ref: '#/components/responses/BadRequest'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}

  /telemetry/notice:
    get:
      tags: [Telemetry]
      summary: Get instance-wide telemetry notice and consent state
      operationId: getTelemetryNotice
      x-capability: telemetry
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Telemetry notice state
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ObjectDataResponse'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '404': {$ref: '#/components/responses/NotFound'}

  /telemetry/accept:
    post:
      tags: [Telemetry]
      summary: Enable instance-wide telemetry and dismiss the notice
      operationId: acceptTelemetry
      x-capability: telemetry
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Telemetry accepted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ActionResponse'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}

  /telemetry/opt-out:
    post:
      tags: [Telemetry]
      summary: Disable instance-wide telemetry
      operationId: optOutOfTelemetry
      x-capability: telemetry
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Telemetry disabled for the instance
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ActionResponse'}
        '401': {$ref: '#/components/responses/Unauthorized'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '404': {$ref: '#/components/responses/NotFound'}

  /config:
    get:
      tags: [Utilities]
      summary: Get public deployment and mobile capability configuration
      operationId: getPublicConfig
      security: []
      responses:
        '200':
          description: Public deployment configuration
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    $ref: '#/components/schemas/PublicConfig'

  /version:
    get:
      tags: [Utilities]
      summary: Get API version info
      operationId: getVersion
      security: []
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      version:
                        type: string
                        example: "3.1.0"
                      api_version:
                        type: string
                        example: "v2"
                      license:
                        type: string
                      license_url:
                        type: string
                      features:
                        type: array
                        items:
                          type: string
                      mobile:
                        $ref: '#/components/schemas/MobileCapabilities'

  /ping:
    get:
      tags: [Utilities]
      summary: Check API liveness
      operationId: pingServer
      security: []
      responses:
        '200':
          description: API is reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: Browser session accepted by endpoints using the shared auth decorator

  headers:
    IdempotencyReplayed:
      description: Present and true only when a stored mutation response was replayed
      schema:
        type: boolean

  parameters:
    XDatabase:
      name: X-Database
      in: header
      required: true
      description: |
        Database/workspace name to operate on. Use `_all_` only on endpoints
        that explicitly support cross-workspace access. Mutation idempotency is
        isolated by authenticated user and the affected database.
      schema:
        type: string
        example: personal
    BillId:
      name: bill_id
      in: path
      required: true
      schema:
        type: integer
    ShareId:
      name: share_id
      in: path
      required: true
      schema: {type: integer}
    BudgetId:
      name: budget_id
      in: path
      required: true
      schema: {type: integer}
    UserId:
      name: target_user_id
      in: path
      required: true
      schema: {type: integer}
    InvitationId:
      name: invite_id
      in: path
      required: true
      schema: {type: integer}
    DatabaseId:
      name: database_id
      in: path
      required: true
      schema: {type: integer}
    DeviceId:
      name: device_id
      in: path
      required: true
      schema: {type: integer}
    OAuthProvider:
      name: provider
      in: path
      required: true
      schema: {type: string}
    PasskeyId:
      name: passkey_id
      in: path
      required: true
      schema: {type: integer}

  responses:
    BadRequest:
      description: Invalid request or required workspace header missing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing, invalid, or expired access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated user cannot access the requested resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource changed or the mutation UUID was reused
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ConflictResponse'
              - $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Request rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Server could not complete the request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
        code:
          type: string
          nullable: true
          description: Stable machine-readable code on new contract-aware errors
        details:
          type: object
          nullable: true
          additionalProperties: true

    ConflictResponse:
      type: object
      required: [success, error, code, conflict]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string
        code:
          type: string
          enum: [resource_conflict]
        conflict:
          $ref: '#/components/schemas/ResourceConflict'

    ResourceConflict:
      type: object
      required: [entity, entity_id, reason, server_updated_at, server]
      properties:
        entity:
          type: string
          enum: [bill, payment, share]
        entity_id:
          type: integer
        reason:
          type: string
          enum: [modified]
        base_updated_at:
          type: string
          format: date-time
        server_updated_at:
          type: string
          format: date-time
        server:
          type: object
          additionalProperties: true

    MutationControl:
      type: object
      properties:
        client_mutation_id:
          type: string
          format: uuid
          description: |
            Optional idempotency UUID. Repeating the same user/database/request
            returns the original status and body with `Idempotency-Replayed: true`.
            A bill move remains scoped to the source database selected by the
            original request, so a retry is replayable after the bill moves.
        base_updated_at:
          type: string
          format: date-time
          description: >-
            Last server timestamp read by the client, encoded as RFC3339 with a
            UTC offset. Legacy clients may omit this field; when present it
            cannot be null, empty, or offset-free.

    ObjectDataResponse:
      type: object
      required: [success]
      additionalProperties: true
      properties:
        success: {type: boolean, enum: [true]}
        data:
          type: object
          additionalProperties: true
        message: {type: string}

    ListDataResponse:
      type: object
      required: [success, data]
      properties:
        success: {type: boolean, enum: [true]}
        data:
          type: array
          items:
            type: object
            additionalProperties: true

    StringListResponse:
      type: object
      required: [success, data]
      properties:
        success: {type: boolean, enum: [true]}
        data:
          type: array
          items: {type: string}

    ActionResponse:
      type: object
      required: [success]
      additionalProperties: true
      properties:
        success: {type: boolean, enum: [true]}
        message: {type: string}
        data:
          type: object
          additionalProperties: true
          properties:
            message: {type: string}
            id: {type: integer}
            updated_at: {type: string, format: date-time}

    StripeWebhookResponse:
      type: object
      required: [received]
      properties:
        received: {type: boolean, enum: [true]}

    RegistrationInput:
      type: object
      required: [username, email, password]
      properties:
        username: {type: string}
        email: {type: string, format: email}
        password: {type: string, format: password, minLength: 8}
        invitation_token: {type: string}

    InvitationAcceptanceInput:
      type: object
      required: [token, username, password]
      properties:
        token: {type: string}
        username: {type: string}
        password: {type: string, format: password, minLength: 8}

    EmailInput:
      type: object
      required: [email]
      properties:
        email: {type: string, format: email}

    TokenInput:
      type: object
      required: [token]
      properties:
        token: {type: string}

    ResetPasswordInput:
      allOf:
        - $ref: '#/components/schemas/TokenInput'
        - type: object
          required: [password]
          properties:
            password: {type: string, format: password, minLength: 8}

    AccountDeleteInput:
      type: object
      required: [password, confirmation]
      properties:
        password: {type: string, format: password}
        confirmation: {type: string, enum: [DELETE]}

    OAuthCallbackInput:
      type: object
      required: [code, state]
      properties:
        code: {type: string}
        state: {type: string}
        redirect_uri: {type: string, format: uri}

    EmailOtpSetupConfirmInput:
      type: object
      required: [code]
      properties:
        code: {type: string}

    PasskeyRegistrationInput:
      type: object
      required: [credential]
      properties:
        credential:
          type: object
          additionalProperties: true
        name: {type: string}

    SecurityConfirmationInput:
      type: object
      properties:
        password: {type: string, format: password}
        code: {type: string}

    SessionTokenInput:
      type: object
      required: [session_token]
      properties:
        session_token: {type: string}

    TwoFactorChallengeInput:
      allOf:
        - $ref: '#/components/schemas/SessionTokenInput'
        - type: object
          properties:
            method: {type: string, enum: [email, passkey, recovery_code]}

    TwoFactorVerifyInput:
      allOf:
        - $ref: '#/components/schemas/SessionTokenInput'
        - type: object
          properties:
            code: {type: string}
            recovery_code: {type: string}
            credential:
              type: object
              additionalProperties: true

    PlanChangeInput:
      type: object
      required: [plan]
      properties:
        plan: {type: string}
        billing_period: {type: string, enum: [monthly, yearly]}

    MobileCapabilities:
      type: object
      required:
        - mobile_contract_version
        - server_version
        - minimum_mobile_version
        - deployment_mode
        - default_currency
        - default_locale
        - oauth_providers
        - features
      properties:
        mobile_contract_version:
          type: integer
          minimum: 1
        server_version:
          type: string
        minimum_mobile_version:
          type: string
          nullable: true
        deployment_mode:
          type: string
          enum: [saas, self-hosted]
        default_currency:
          type: string
          minLength: 3
          maxLength: 3
        default_locale:
          type: string
        oauth_providers:
          type: array
          items:
            type: string
            enum: [google, apple, microsoft, oidc]
        features:
          type: object
          required:
            - registration
            - email
            - email_verification
            - oauth
            - email_otp
            - passkeys
            - billing
            - administration
            - sharing
            - settlements
            - telemetry
            - delta_sync
            - idempotent_mutations
            - optimistic_concurrency
          properties:
            registration: {type: boolean}
            email: {type: boolean}
            email_verification: {type: boolean}
            oauth: {type: boolean}
            email_otp: {type: boolean}
            passkeys: {type: boolean}
            billing: {type: boolean}
            administration: {type: boolean}
            sharing: {type: boolean}
            settlements: {type: boolean}
            telemetry: {type: boolean}
            delta_sync: {type: boolean}
            idempotent_mutations: {type: boolean}
            optimistic_concurrency: {type: boolean}

    PublicConfig:
      type: object
      required:
        - deployment_mode
        - billing_enabled
        - registration_enabled
        - email_enabled
        - email_verification_required
        - oauth_providers
        - twofa_enabled
        - passkeys_enabled
        - default_currency
        - default_locale
        - mobile
      properties:
        deployment_mode:
          type: string
          enum: [saas, self-hosted]
        billing_enabled: {type: boolean}
        registration_enabled: {type: boolean}
        email_enabled: {type: boolean}
        email_verification_required: {type: boolean}
        oauth_providers:
          type: array
          items:
            type: object
            required: [id, display_name, icon]
            properties:
              id: {type: string}
              display_name: {type: string}
              icon: {type: string}
        twofa_enabled: {type: boolean}
        passkeys_enabled: {type: boolean}
        default_currency: {type: string}
        default_locale: {type: string}
        mobile:
          $ref: '#/components/schemas/MobileCapabilities'
        tier_limits:
          type: object
          nullable: true
          additionalProperties: true
        pricing:
          type: object
          nullable: true
          additionalProperties: true

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            message:
              type: string
            id:
              type: integer
            last_updated:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            access_token:
              type: string
            refresh_token:
              type: string
            expires_in:
              type: integer
              example: 900
            token_type:
              type: string
              example: Bearer
            user:
              type: object
              properties:
                id:
                  type: integer
                username:
                  type: string
                role:
                  type: string
            databases:
              type: array
              items:
                $ref: '#/components/schemas/DatabaseInfo'

    DatabaseInfo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        display_name:
          type: string
        description:
          type: string
          nullable: true

    Bill:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        amount:
          type: number
          nullable: true
        varies:
          type: boolean
        avg_amount:
          type: number
          description: Average payment amount (only for variable bills)
        frequency:
          type: string
          enum: [once, weekly, bi-weekly, biweekly, monthly, quarterly, yearly, custom]
        frequency_type:
          type: string
          enum: [simple, specific_dates, multiple_weekly]
        frequency_config:
          type: string
          description: JSON configuration for complex frequencies
        next_due:
          type: string
          format: date
        auto_payment:
          type: boolean
        icon:
          type: string
        type:
          type: string
          enum: [expense, deposit]
        account:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        reminder_enabled:
          type: boolean
        reminder_days:
          type: array
          items:
            type: integer
            minimum: 0
        database_id:
          type: integer
        last_updated:
          type: string
          format: date-time
        archived:
          type: boolean
        is_shared:
          type: boolean
          description: True if this bill is shared with the current user (recipient view)
        share_info:
          type: object
          nullable: true
          description: Share information (only present when is_shared is true)
          properties:
            share_id:
              type: integer
              description: ID of the share record
            owner_name:
              type: string
              description: Username of the bill owner
            my_portion:
              type: number
              nullable: true
              description: Amount the recipient owes
            my_portion_paid:
              type: boolean
              description: Whether recipient has marked their portion as paid
            my_portion_paid_date:
              type: string
              format: date-time
              nullable: true
              description: When recipient marked their portion as paid

    BillMutationFields:
      allOf:
        - $ref: '#/components/schemas/MutationControl'
        - type: object
          properties:
            database_id:
              type: integer
              description: Explicit destination workspace, required for create in `_all_`
            name:
              type: string
            amount:
              type: number
              nullable: true
            varies:
              type: boolean
              default: false
            frequency:
              type: string
              enum: [once, weekly, bi-weekly, biweekly, monthly, quarterly, yearly, custom]
              default: monthly
            frequency_type:
              type: string
              enum: [simple, specific_dates, multiple_weekly]
              default: simple
            frequency_config:
              type: string
              default: "{}"
            next_due:
              type: string
              format: date
            auto_payment:
              type: boolean
              default: false
            icon:
              type: string
              default: payment
            type:
              type: string
              enum: [expense, deposit]
              default: expense
            account:
              type: string
              nullable: true
            category:
              type: string
              nullable: true
            notes:
              type: string
              nullable: true
            reminder_enabled:
              type: boolean
              default: true
            reminder_days:
              type: array
              items:
                type: integer
                minimum: 0

    BillCreateInput:
      allOf:
        - $ref: '#/components/schemas/BillMutationFields'
        - type: object
          required: [name, next_due]

    BillUpdateInput:
      allOf:
        - $ref: '#/components/schemas/BillMutationFields'

    PaymentCreateInput:
      allOf:
        - $ref: '#/components/schemas/MutationControl'
        - type: object
          properties:
            amount:
              type: number
              description: Payment amount (defaults to bill amount)
            payment_date:
              type: string
              format: date
              description: Payment date (defaults to today)
            notes:
              type: string
              nullable: true
            advance_due:
              type: boolean
              default: true
              description: Advance due date to next occurrence

    PaymentUpdateInput:
      allOf:
        - $ref: '#/components/schemas/MutationControl'
        - type: object
          properties:
            amount:
              type: number
            payment_date:
              type: string
              format: date
            notes:
              type: string
              nullable: true
    Payment:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        payment_date:
          type: string
          format: date
        notes:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time

    PaymentWithBill:
      allOf:
        - $ref: '#/components/schemas/Payment'
        - type: object
          properties:
            bill_id:
              type: integer
            bill_name:
              type: string
            bill_icon:
              type: string
            bill_type:
              type: string
              enum: [expense, deposit]

    BillShare:
      type: object
      properties:
        id:
          type: integer
          description: Unique share ID
        bill_id:
          type: integer
          description: ID of the shared bill
        owner_user_id:
          type: integer
          description: User ID of the bill owner
        owner_username:
          type: string
          description: Username of the bill owner
        shared_with_user_id:
          type: integer
          nullable: true
          description: User ID of the recipient (null if email-based)
        shared_with_identifier:
          type: string
          description: Username or email of recipient
        identifier_type:
          type: string
          enum: [username, email]
          description: Type of identifier used
        status:
          type: string
          enum: [pending, accepted, declined, revoked]
          description: Current status of the share
        split_type:
          type: string
          enum: [percentage, fixed, equal]
          nullable: true
          description: How the bill is split
        split_value:
          type: number
          nullable: true
          description: Split amount (percentage or fixed dollar amount)
        created_at:
          type: string
          format: date-time
          nullable: true
        accepted_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
        recipient_paid_date:
          type: string
          format: date-time
          nullable: true
          description: When recipient marked their portion as paid

    BillShareWithBillInfo:
      allOf:
        - $ref: '#/components/schemas/BillShare'
        - type: object
          properties:
            bill_name:
              type: string
              description: Name of the shared bill
            bill_amount:
              type: number
              nullable: true
              description: Total bill amount
            my_portion:
              type: number
              nullable: true
              description: Calculated amount the recipient owes

    BillShareCreateInput:
      allOf:
        - $ref: '#/components/schemas/MutationControl'
        - type: object
          required: [identifier]
          properties:
            identifier:
              type: string
              description: Recipient username or email address
            split_type:
              type: string
              enum: [percentage, fixed, equal]
              nullable: true
            split_value:
              type: number
              nullable: true

    BillShareUpdateInput:
      allOf:
        - $ref: '#/components/schemas/MutationControl'
        - type: object
          properties:
            split_type:
              type: string
              enum: [percentage, fixed, equal]
              nullable: true
            split_value:
              type: number
              nullable: true

    ShareTokenMutationInput:
      allOf:
        - $ref: '#/components/schemas/MutationControl'
        - type: object
          required: [token]
          properties:
            token: {type: string}

    BillShareResponse:
      type: object
      required: [success, data]
      properties:
        success: {type: boolean, enum: [true]}
        data:
          allOf:
            - $ref: '#/components/schemas/BillShare'
            - type: object
              required: [id, message]
              properties:
                message: {type: string}

    SettlementResponse:
      type: object
      required: [success, data]
      properties:
        success: {type: boolean, enum: [true]}
        data:
          type: object
          required: [summary, owed_to_me, i_owe, settled, people]
          properties:
            summary:
              type: object
              required: [owed_to_me, i_owe, net_balance, open_count, settled_count]
              properties:
                owed_to_me: {type: number}
                i_owe: {type: number}
                net_balance: {type: number}
                open_count: {type: integer}
                settled_count: {type: integer}
                overdue_owed_to_me: {type: integer}
                overdue_i_owe: {type: integer}
            owed_to_me:
              type: array
              items: {$ref: '#/components/schemas/SettlementItem'}
            i_owe:
              type: array
              items: {$ref: '#/components/schemas/SettlementItem'}
            settled:
              type: array
              maxItems: 25
              items: {$ref: '#/components/schemas/SettlementItem'}
            people:
              type: array
              items:
                type: object
                properties:
                  counterparty_name: {type: string}
                  owed_to_me: {type: number}
                  i_owe: {type: number}
                  net: {type: number}
                  open_count: {type: integer}

    SettlementItem:
      type: object
      required: [share_id, direction, bill_id, bill_name, amount, paid]
      properties:
        share_id: {type: integer}
        direction: {type: string, enum: [owed_to_me, i_owe]}
        bill_id: {type: integer}
        bill_name: {type: string}
        bill_icon: {type: string}
        bill_type: {type: string}
        database_id: {type: integer}
        database_name: {type: string}
        counterparty_user_id: {type: integer, nullable: true}
        counterparty_name: {type: string, nullable: true}
        counterparty_identifier: {type: string, nullable: true}
        amount: {type: number}
        total_amount: {type: number, nullable: true}
        due_date: {type: string, format: date}
        days_until_due: {type: integer, nullable: true}
        due_status: {type: string, enum: [overdue, due_today, upcoming, unknown]}
        split_type: {type: string, nullable: true}
        split_value: {type: number, nullable: true}
        paid: {type: boolean}
        paid_date: {type: string, format: date-time, nullable: true}
        created_at: {type: string, format: date-time, nullable: true}
        accepted_at: {type: string, format: date-time, nullable: true}
        share_updated_at: {type: string, format: date-time, nullable: true}

    CategoryBudget:
      type: object
      required: [id, database_id, database_name, category, monthly_limit]
      properties:
        id: {type: integer}
        database_id: {type: integer}
        database_name: {type: string}
        category: {type: string}
        monthly_limit: {type: number, minimum: 0}
        created_at: {type: string, format: date-time, nullable: true}
        updated_at: {type: string, format: date-time, nullable: true}

    CategoryBudgetCreateInput:
      type: object
      required: [category, monthly_limit]
      properties:
        database_id: {type: integer}
        category: {type: string}
        monthly_limit: {type: number, minimum: 0}

    CategoryBudgetUpdateInput:
      type: object
      properties:
        database_id: {type: integer}
        category: {type: string}
        monthly_limit: {type: number, minimum: 0}

    CategoryBudgetResponse:
      type: object
      required: [success, data]
      properties:
        success: {type: boolean, enum: [true]}
        data: {$ref: '#/components/schemas/CategoryBudget'}

    CategoryBudgetListResponse:
      type: object
      required: [success, data]
      properties:
        success: {type: boolean, enum: [true]}
        data:
          type: array
          items: {$ref: '#/components/schemas/CategoryBudget'}

    AdminUserCreateInput:
      type: object
      required: [username, password]
      properties:
        username: {type: string}
        password: {type: string, format: password, minLength: 8}
        email: {type: string, format: email, nullable: true}
        role: {type: string, enum: [admin, user], default: user}
        database_ids:
          type: array
          items: {type: integer}

    AdminUserUpdateInput:
      type: object
      properties:
        email: {type: string, format: email, nullable: true}
        role: {type: string, enum: [admin, user]}

    AdminInvitationInput:
      type: object
      required: [email]
      properties:
        email: {type: string, format: email}
        role: {type: string, enum: [admin, user], default: user}
        database_ids:
          type: array
          items: {type: integer}

    AdminDatabaseCreateInput:
      type: object
      required: [name, display_name]
      properties:
        name: {type: string}
        display_name: {type: string}
        description: {type: string}

    AdminDatabaseUpdateInput:
      type: object
      properties:
        display_name: {type: string}
        description: {type: string, nullable: true}

    DatabaseListResponse:
      type: object
      required: [success, data]
      properties:
        success: {type: boolean, enum: [true]}
        data:
          type: array
          items: {$ref: '#/components/schemas/DatabaseInfo'}

    DeviceRegistrationInput:
      type: object
      required: [device_id, platform]
      properties:
        device_id: {type: string}
        device_name: {type: string, nullable: true}
        platform: {type: string, enum: [ios, android, web, desktop]}
        push_token: {type: string, nullable: true}
        push_provider: {type: string, nullable: true}
        app_version: {type: string, nullable: true}
        os_version: {type: string, nullable: true}
        notification_settings:
          type: object
          additionalProperties: true

    PushTokenInput:
      type: object
      properties:
        push_token: {type: string, nullable: true}
        push_provider: {type: string, nullable: true}

    SyncBillCreateInput:
      allOf:
        - $ref: '#/components/schemas/BillMutationFields'
        - type: object
          required: [name, next_due]
          properties:
            id:
              type: integer
              nullable: true
              enum: [null]
            client_ref: {type: string}

    SyncBillUpdateInput:
      allOf:
        - $ref: '#/components/schemas/BillMutationFields'
        - type: object
          required: [id]
          anyOf:
            - required: [base_updated_at]
            - required: [last_updated]
          properties:
            id: {type: integer, minimum: 1}
            client_ref: {type: string}
            last_updated:
              type: string
              format: date-time
              deprecated: true

    SyncBillInput:
      oneOf:
        - $ref: '#/components/schemas/SyncBillCreateInput'
        - $ref: '#/components/schemas/SyncBillUpdateInput'

    SyncPaymentCreateInput:
      allOf:
        - $ref: '#/components/schemas/PaymentUpdateInput'
        - type: object
          required: [bill_id, amount, payment_date]
          properties:
            id:
              type: integer
              nullable: true
              enum: [null]
            client_ref: {type: string}
            bill_id: {type: integer, minimum: 1}

    SyncPaymentUpdateInput:
      allOf:
        - $ref: '#/components/schemas/PaymentUpdateInput'
        - type: object
          required: [id]
          anyOf:
            - required: [base_updated_at]
            - required: [updated_at]
          properties:
            id: {type: integer, minimum: 1}
            client_ref: {type: string}
            updated_at:
              type: string
              format: date-time
              deprecated: true

    SyncPaymentInput:
      oneOf:
        - $ref: '#/components/schemas/SyncPaymentCreateInput'
        - $ref: '#/components/schemas/SyncPaymentUpdateInput'

    SyncDeletedEntity:
      type: object
      required: [id, base_updated_at]
      properties:
        id: {type: integer, minimum: 1}
        base_updated_at:
          type: string
          format: date-time
          description: >-
            Required server timestamp used for destructive conflict detection

    SyncPushInput:
      type: object
      properties:
        client_mutation_id:
          type: string
          format: uuid
        bills:
          type: array
          items: {$ref: '#/components/schemas/SyncBillInput'}
        payments:
          type: array
          items: {$ref: '#/components/schemas/SyncPaymentInput'}
        deleted_bills:
          type: array
          items: {$ref: '#/components/schemas/SyncDeletedEntity'}
        deleted_payments:
          type: array
          items: {$ref: '#/components/schemas/SyncDeletedEntity'}

    SyncResultItem:
      type: object
      properties:
        id: {type: integer, nullable: true}
        action: {type: string}
        client_ref: {type: string, nullable: true}
        reason: {type: string}
        code: {type: string, enum: [resource_conflict]}
        server_data:
          type: object
          additionalProperties: true
        data:
          type: object
          additionalProperties: true

    SyncPushResponse:
      type: object
      required: [success, data]
      properties:
        success: {type: boolean, enum: [true]}
        data:
          type: object
          required: [accepted_bills, rejected_bills, accepted_payments, rejected_payments, server_time]
          properties:
            accepted_bills:
              type: array
              items: {$ref: '#/components/schemas/SyncResultItem'}
            rejected_bills:
              type: array
              items: {$ref: '#/components/schemas/SyncResultItem'}
            accepted_payments:
              type: array
              items: {$ref: '#/components/schemas/SyncResultItem'}
            rejected_payments:
              type: array
              items: {$ref: '#/components/schemas/SyncResultItem'}
            server_time: {type: string, format: date-time}

    SyncPayment:
      allOf:
        - $ref: '#/components/schemas/Payment'
        - type: object
          properties:
            bill_id: {type: integer}
            created_at: {type: string, format: date-time, nullable: true}

    SyncPullResponse:
      type: object
      required: [success, data]
      properties:
        success: {type: boolean, enum: [true]}
        data:
          type: object
          required: [bills, payments, server_time]
          properties:
            bills:
              type: array
              items: {$ref: '#/components/schemas/Bill'}
            payments:
              type: array
              items: {$ref: '#/components/schemas/SyncPayment'}
            server_time: {type: string, format: date-time}
            has_more: {type: boolean}
